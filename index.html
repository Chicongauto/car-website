<!DOCTYPE html>
<html>
<head>
<title>Web bán xe</title>
<style>
body{
font-family: Arial;
background:#f5f5f5;
}

.container{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.car{
background:white;
padding:15px;
width:250px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.car img{
width:100%;
border-radius:8px;
}

.price{
color:red;
font-weight:bold;
}
</style>
</head>

<body>

<h1>Xe đang bán</h1>

<div class="container">

<div class="car">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Kia_Sedona.jpg">
<h3>Kia Sedona 2019</h3>
<p>100.000 km</p>
<p class="price">720 triệu</p>
</div>

<div class="car">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Mercedes_GLC.jpg">
<h3>Mercedes GLC 200</h3>
<p>60.000 km</p>
<p class="price">1.299 tỷ</p>
</div>

</div>

</body>
</html>
